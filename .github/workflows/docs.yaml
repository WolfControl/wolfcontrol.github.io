name: Deploy Documentation to Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'
  repository_dispatch:
    types: [swagger-update]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.124.0
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Checkout WolfControl services repository
        uses: actions/checkout@v4
        with:
          repository: WolfControl/services
          path: services
          token: ${{ secrets.CICD_KEY }}

      - name: Store versioned spec
        if: github.event_name == 'repository_dispatch'
        run: |
          VERSION=${{ github.event.client_payload.version }}
          mkdir -p specs/wolfcontroller
          sed "s/^  version: .*/  version: ${VERSION}/" \
            services/wolfcontroller/api/swagger.yaml \
            > specs/wolfcontroller/${VERSION}.yaml
          cp specs/wolfcontroller/${VERSION}.yaml specs/wolfcontroller/latest.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add specs/wolfcontroller/
          git diff --cached --quiet || git commit -m "docs: add wolfcontroller ${VERSION} spec"
          git pull --rebase origin main
          git push

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: Install redocly CLI
        run: npm i -g @redocly/cli@latest

      - name: Build API docs for all versions
        run: |
          mkdir -p static/api/wolfcontroller
          versions=()
          for spec in $(ls specs/wolfcontroller/v*.yaml 2>/dev/null | sort -V -r); do
            ver=$(basename "$spec" .yaml)
            redocly build-docs "$spec" --output "static/api/wolfcontroller/${ver}.html"
            versions+=("\"${ver}\"")
          done
          echo "[$(IFS=,; echo "${versions[*]}")]" > static/api/wolfcontroller/versions.json

      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Install Dart Sass
        run: sudo snap install dart-sass

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Install Docsy dependencies
        run: npm install -D autoprefixer postcss-cli postcss

      - name: Install Node.js dependencies
        run: "[[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true"

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
